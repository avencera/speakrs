type: dev-environment
name: gpu-dev

image: ghcr.io/avencera/speakrs-gpu:9bbb0be
ide: vscode

env:
  - NVIDIA_VISIBLE_DEVICES=all
  - LD_LIBRARY_PATH=/usr/local/lib:/usr/local/cuda/lib64
  - HF_TOKEN
  - AWS_ACCESS_KEY_ID
  - AWS_SECRET_ACCESS_KEY
  - AWS_ENDPOINT_URL
  - AWS_REGION

init:
  - echo "GPU dev environment ready"

resources:
  gpu:
    name: [RTX4090, RTX5090, RTX6000Ada, L40S]
    count: 1

inactivity_duration: 2h
max_duration: 12h
spot_policy: on-demand
